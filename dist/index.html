x h2:not(:first-child){margin-top:20px}.recipe{display:flex;align-items:center;gap:14px;background:#ffffff0f;border-radius:12px;padding:10px 14px;margin-bottom:8px}.recipe.off{opacity:.55}.recipe .ric{font-size:28px}.rmid{flex:1;display:flex;flex-direction:column;gap:2px}.rmid b{font-size:15px}.rdesc{font-size:12px;color:#ffffffa6}.rcost{display:flex;gap:6px;margin-top:3px}.chip{background:#ffffff1a;border-radius:999px;padding:1px 8px;font-size:12px;font-weight:700}.chip.miss{color:#ff8a80;background:#ff505026}.recipe button{background:#ffd166;color:#2b2b1a;border:none;border-radius:10px;font-weight:800;font-size:13px;padding:9px 16px;cursor:pointer;font-family:inherit}.recipe button:disabled{background:#ffffff26;color:#fff6;cursor:default}.recipe button:not(:disabled):hover{filter:brightness(1.1)}#invGrid{display:flex;flex-wrap:wrap;gap:8px}.invItem{background:#ffffff12;border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:7px;font-size:18px}.invItem b{font-size:14px}.empty{color:#ffffff73;font-size:13px}#overlay{position:fixed;inset:0;z-index:30;background:#080a0880;display:flex;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}.panel{text-align:center;background:#181c14f0;border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:36px 44px;color:#fff;max-width:min(520px,92vw);box-shadow:0 20px 60px #00000080}.panel h1{font-size:42px;letter-spacing:2px;margin-bottom:6px}.panel .sub{color:#ffffffb3;font-size:15px;margin-bottom:22px}.btnrow{display:flex;gap:10px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}.bigBtn{background:#ffffff1f;color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:12px;font-size:16px;font-weight:700;padding:13px 26px;cursor:pointer;font-family:inherit;transition:transform .1s,background .15s}.bigBtn:hover{transform:translateY(-1px);background:#fff3}.bigBtn.primary{background:#ffd166;color:#2b2b1a;border-color:transparent}.bigBtn.primary:hover{filter:brightness(1.08)}.bigBtn:disabled{opacity:.55;cursor:default;transform:none;filter:grayscale(.35)}.controls{margin:0 auto;border-collapse:collapse;font-size:13px;color:#fffc}.controls td{padding:3px 12px;text-align:left}.controls td:first-child{font-weight:800;color:#ffd166;text-align:right;white-space:nowrap}#vignette{position:fixed;inset:0;z-index:15;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(200,20,20,.55) 100%)}#vignette.flash{animation:dmg .5s ease-out}@keyframes dmg{0%{opacity:1}to{opacity:0}}#touchUI{position:fixed;inset:0;z-index:12;pointer-events:none;touch-action:none}#joystick{position:absolute;left:92px;top:calc(100% - 105px);width:112px;height:112px;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.32);border-radius:50%;background:#0c100c47;opacity:.48;transition:opacity .12s}#joystick.active{opacity:.9}#joyKnob{position:absolute;left:50%;top:50%;width:50px;height:50px;margin:-25px;border-radius:50%;background:#ffd166d1;border:2px solid rgba(255,255,255,.65);box-shadow:0 3px 12px #00000059}.touchBtn,.touchTop{position:absolute;pointer-events:auto;touch-action:none;border:2px solid rgba(255,255,255,.38);color:#fff;background:#12161094;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);font-family:inherit;font-weight:800;line-height:1;-webkit-tap-highlight-color:transparent}.touchBtn{width:58px;height:58px;border-radius:50%;font-size:24px}.touchBtn.action{width:72px;height:72px;right:22px;bottom:26px;font-size:29px}#btnJump{right:105px;bottom:91px}#btnInteract{right:112px;bottom:20px}#btnRotate{right:28px;bottom:112px}.touchTop{top:max(12px,env(safe-area-inset-top));width:46px;height:40px;border-radius:12px;font-size:18px}#btnPauseM{right:max(12px,env(safe-area-inset-right))}#btnCraftM{right:max(66px,calc(env(safe-area-inset-right) + 54px))}.touchBtn.pressed,.touchTop.pressed{transform:scale(.9);background:#ffd166b8}body.touch{touch-action:none;overscroll-behavior:none}body.touch #hotbar{bottom:max(8px,env(safe-area-inset-bottom));max-width:46vw;overflow-x:auto}body.touch .slot{width:48px;height:48px;flex:0 0 48px}body.touch .slot .key,body.touch #ovControls{display:none}body.touch #prompt{bottom:88px;font-size:13px}@media(max-width:700px){#statsPanel{top:max(10px,env(safe-area-inset-top));left:10px;padding:9px 10px}.track{width:108px}#clockPanel{top:max(10px,env(safe-area-inset-top))}#matPanel{top:58px;right:10px;padding:8px 10px}.panel{padding:28px 22px}.panel h1{font-size:34px}.craftBox{width:96vw;max-height:92vh;padding:16px}}</style>
</head>
<body>
  <div id="app"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="crosshair">+</div>
    <div id="targetName"></div>
    <div id="prompt" class="hidden"></div>
    <div id="toasts"></div>

    <div id="statsPanel">
      <div class="bar hp"><span class="bicon">❤️</span><div class="track"><div class="fill" id="hpFill"></div></div></div>
      <div class="bar hunger"><span class="bicon">🍖</span><div class="track"><div class="fill" id="hungerFill"></div></div></div>
    </div>

    <div id="clockPanel">
      <span id="timeIcon">☀️</span>
      <span id="dayLabel">Tag 1</span>
    </div>

    <div id="matPanel"></div>

    <div id="selName"></div>
    <div id="hotbar"></div>
  </div>

  <!-- Crafting -->
  <div id="craft" class="hidden">
    <div class="craftBox">
      <h2>🛠️ Crafting</h2>
      <div id="recipeList"></div>
      <h2>🎒 Inventar</h2>
      <div id="invGrid"></div>
      <button id="craftClose" class="bigBtn">Zurück ins Spiel (Tab)</button>
    </div>
  </div>

  <!-- Overlay: Menü / Pause / Tod -->
  <div id="overlay">
    <div class="panel">
      <h1 id="ovTitle">🏕️ WILDNIS</h1>
      <p id="ovSub" class="sub">Low-Poly Survival</p>
      <div class="btnrow">
        <button id="btnPlay" class="bigBtn primary">▶️ Spiel starten</button>
        <button id="btnNew" class="bigBtn hidden">🌱 Neues Spiel</button>
      </div>
      <table id="ovControls" class="controls">
        <tr><td>W A S D</td><td>Laufen</td></tr>
        <tr><td>Shift</td><td>Sprinten</td></tr>
        <tr><td>Leertaste</td><td>Springen</td></tr>
        <tr><td>Maus</td><td>Umsehen</td></tr>
        <tr><td>Linksklick</td><td>Sammeln · Kämpfen · Essen · Bauen</td></tr>
        <tr><td>E</td><td>Interagieren (Braten / Schlafen)</td></tr>
        <tr><td>Tab / C</td><td>Crafting &amp; Inventar</td></tr>
        <tr><td>1–9 / Mausrad</td><td>Hotbar</td></tr>
        <tr><td>R</td><td>Bauteil drehen</td></tr>
        <tr><td>M</td><td>Ton an / aus</td></tr>
      </table>
    </div>
  </div>

  <div id="vignette"></div>

  <div id="touchUI" class="hidden" aria-label="Touch-Steuerung">
    <button id="btnPauseM" class="touchTop" aria-label="Pause">Ⅱ</button>
    <button id="btnCraftM" class="touchTop" aria-label="Crafting öffnen">🛠️</button>
    <div id="joystick"><div id="joyKnob"></div></div>
    <button id="btnRotate" class="touchBtn hidden" aria-label="Bauteil drehen">↻</button>
    <button id="btnInteract" class="touchBtn hidden" aria-label="Interagieren">E</button>
    <button id="btnJump" class="touchBtn" aria-label="Springen">↑</button>
    <button id="btnAction" class="touchBtn action" aria-label="Aktion">👊</button>
  </div>

</body>
</html>
