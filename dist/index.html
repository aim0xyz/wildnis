px}#btnJump{right:105px;bottom:91px}#btnInteract{right:112px;bottom:20px}#btnRotate{right:28px;bottom:112px}.touchTop{top:max(12px,env(safe-area-inset-top));width:46px;height:40px;border-radius:12px;font-size:18px}#btnPauseM{right:max(12px,env(safe-area-inset-right))}#btnCraftM{right:max(66px,calc(env(safe-area-inset-right) + 54px))}.touchBtn.pressed,.touchTop.pressed{transform:scale(.9);background:#ffd166b8}body.touch{touch-action:none;overscroll-behavior:none}body.touch #hotbar{bottom:max(8px,env(safe-area-inset-bottom));max-width:46vw;overflow-x:auto}body.touch .slot{width:48px;height:48px;flex:0 0 48px}body.touch .slot .key,body.touch #ovControls{display:none}body.touch #prompt{bottom:88px;font-size:13px}@media(max-width:700px){#statsPanel{top:max(10px,env(safe-area-inset-top));left:10px;padding:9px 10px}.track{width:108px}#clockPanel{top:max(10px,env(safe-area-inset-top))}#matPanel{top:58px;right:10px;padding:8px 10px}.panel{padding:28px 22px}.panel h1{font-size:34px}.craftBox{width:96vw;max-height:92vh;padding:16px}}</style>
</head>
<body>
  <div id="app"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="crosshair">+</div>
    <div id="targetName"></div>
    <div id="prompt" class="hidden"></div>
    <div id="toasts"></div>

    <div id="statsPanel">
      <div class="bar hp"><span class="bicon" data-icon="heart"></span><div class="track"><div class="fill" id="hpFill"></div></div></div>
      <div class="bar hunger"><span class="bicon" data-icon="food"></span><div class="track"><div class="fill" id="hungerFill"></div></div></div>
    </div>

    <div id="clockPanel">
      <span id="timeIcon" data-icon="sun"></span>
      <span id="dayLabel">Tag 1</span>
    </div>

    <div id="matPanel"></div>

    <div id="selName"></div>
    <div id="hotbar"></div>
  </div>

  <!-- Crafting -->
  <div id="craft" class="hidden">
    <div class="craftBox">
      <h2><span data-icon="craft"></span> Crafting</h2>
      <div id="recipeList"></div>
      <h2><span data-icon="backpack"></span> Inventar</h2>
      <div id="invGrid"></div>
      <button id="craftClose" class="bigBtn">Zurück ins Spiel (Tab)</button>
    </div>
  </div>

  <!-- Overlay: Menü / Pause / Tod -->
  <div id="overlay">
    <div class="panel">
      <h1 id="ovTitle"><span data-icon="tent"></span> WILDNIS</h1>
      <p id="ovSub" class="sub">Low-Poly Survival</p>
      <div class="btnrow">
        <button id="btnPlay" class="bigBtn primary"><span data-icon="play"></span> Spiel starten</button>
        <button id="btnNew" class="bigBtn hidden"><span data-icon="sprout"></span> Neues Spiel</button>
      </div>
      <table id="ovControls" class="controls">
        <tr><td>W A S D</td><td>Laufen</td></tr>
        <tr><td>Shift</td><td>Sprinten</td></tr>
        <tr><td>Leertaste</td><td>Springen</td></tr>
        <tr><td>Maus</td><td>Umsehen</td></tr>
        <tr><td>Linksklick</td><td>Sammeln · Kämpfen · Essen · Bauen</td></tr>
        <tr><td>E</td><td>Interagieren (Braten / Schlafen)</td></tr>
        <tr><td>Tab / C</td><td>Crafting &amp; Inventar</td></tr>
        <tr><td>1–9 / Mausrad</td><td>Hotbar</td></tr>
        <tr><td>R</td><td>Bauteil drehen</td></tr>
        <tr><td>M</td><td>Ton an / aus</td></tr>
      </table>
    </div>
  </div>

  <div id="vignette"></div>

  <div id="touchUI" class="hidden" aria-label="Touch-Steuerung">
    <button id="btnPauseM" class="touchTop" aria-label="Pause" data-icon="pause"></button>
    <button id="btnCraftM" class="touchTop" aria-label="Crafting öffnen" data-icon="craft"></button>
    <div id="joystick"><div id="joyKnob"></div></div>
    <button id="btnRotate" class="touchBtn hidden" aria-label="Bauteil drehen" data-icon="rotate"></button>
    <button id="btnInteract" class="touchBtn hidden" aria-label="Interagieren">E</button>
    <button id="btnJump" class="touchBtn" aria-label="Springen" data-icon="jump"></button>
    <button id="btnAction" class="touchBtn action" aria-label="Aktion" data-icon="fist"></button>
  </div>

</body>
</html>
